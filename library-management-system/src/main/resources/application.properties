# ============================================================
# Library Management System - Application Configuration
# ============================================================

# Server Configuration
server.port=8080
spring.application.name=library-management-system

# ============================================================
# MongoDB Configuration
# ============================================================
spring.data.mongodb.host=localhost
spring.data.mongodb.port=27017
spring.data.mongodb.database=library_db
# Uncomment below if MongoDB requires authentication:
# spring.data.mongodb.username=admin
# spring.data.mongodb.password=password
# spring.data.mongodb.authentication-database=admin

# Full URI alternative (comment out host/port/database above if using this):
# spring.data.mongodb.uri=mongodb://localhost:27017/library_db

# ============================================================
# Logging Configuration
# ============================================================
logging.level.root=INFO
logging.level.com.library=DEBUG
logging.level.org.springframework.data.mongodb=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/library-management.log

# ============================================================
# Swagger / OpenAPI Configuration
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.packages-to-scan=com.library.controller

# ============================================================
# Jackson Configuration
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd
spring.jackson.time-zone=UTC

# ============================================================
# Pagination Defaults
# ============================================================
app.pagination.default-page-size=10
app.pagination.max-page-size=100
